name: Scrape Jobs

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  scrape:
    name: Run all job scrapers
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Run scrapers
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          SCRAPERAPI_KEY_BACKUP: ${{ secrets.SCRAPERAPI_KEY_BACKUP }}
          SCRAPERAPI_EXTRA_KEYS: ${{ secrets.SCRAPERAPI_EXTRA_KEYS }}
        run: node --experimental-loader ./scripts/alias-loader.mjs scripts/run-scrapers.mjs
